name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '**/*.toml'
      - '**/*.conf'
      - '**/*.glsl'
      - '**/*.go'
      - 'release.yml'
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dagger CLI
        uses: dagger/dagger-for-github@v8.4.0
        with:
          install-only: true

      - name: Test
        run: make test
