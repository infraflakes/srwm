name: srwm Release  
  
on:  
  push:  
    tags:  
      - 'v*'  
  
jobs:  
  build-and-release:  
    runs-on: ubuntu-latest  
    permissions:  
      contents: write  
    steps:  
      - name: Checkout Source  
        uses: actions/checkout@v4  
  
      - name: Build All Platforms  
        uses: dagger/dagger-for-github@v8.4.0  
        with:  
          verb: call  
          args: build-all --source=. export --path=./bin  
  
      - name: Package and Checksum  
        run: |  
          cd bin  
          for f in srwm-*; do  
            dist="${f#srwm-}"  
            mv "$f" "srwm-${{ github.ref_name }}-linux-amd64-${dist}"  
            sha256sum "srwm-${{ github.ref_name }}-linux-amd64-${dist}" \  
              > "srwm-${{ github.ref_name }}-linux-amd64-${dist}.sha256"  
          done  
  
      - name: Create GitHub Release  
        uses: softprops/action-gh-release@v2  
        with:  
          files: bin/*  
          generate_release_notes: true  
          draft: false  
          prerelease: false
