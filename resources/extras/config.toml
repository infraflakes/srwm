autostart = [
     # "vorta -d",
]

focus_follows_mouse = true

[env]
QT_QPA_PLATFORMTHEME = "qt6ct"

[input.keyboard]
layout = "us,ru"
options = "grp:win_space_toggle"

[cursor]
theme = "elementary"

[decorations]
bg_color = "#FDF6E3"
fg_color = "#5C6A72"

# [background]
# shader_path = "/usr/local/share/srwm/wallpapers/pink_cloud.glsl"

[output.outline]
color="#FDF6E3"

[keybindings]
"mod+return" = "exec ghostty"
# swayosd instead of default wpctl/brightnessctl
"XF86AudioRaiseVolume" = "spawn swayosd-client --output-volume raise"
"XF86AudioLowerVolume" = "spawn swayosd-client --output-volume lower"
"XF86AudioMute" = "spawn swayosd-client --output-volume mute-toggle"
"XF86MonBrightnessUp" = "spawn swayosd-client --brightness raise"
"XF86MonBrightnessDown" = "spawn swayosd-client --brightness lower"
"mod+s" = "exec ~/Documents/work/scripts/srwm/extras/scripts/window-search.sh"

[[outputs]]
name = "HDMI-A-1"
transform = "90"

[[window_rules]]
app_id = "Alacritty"
opacity = 0.8
blur = true
# position = [126, -259]
